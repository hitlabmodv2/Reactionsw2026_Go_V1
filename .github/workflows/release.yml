name: Release

# Triggered when a version tag like v1.0.0 is pushed.
# To cut a new release locally:
#   git tag v1.0.0
#   git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

# Needed by softprops/action-gh-release to create the Release.
permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build deps (gcc for CGO/sqlite3)
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build hisoka-linux-amd64
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        run: go build -v -trimpath -o hisoka-linux-amd64 .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: hisoka-linux-amd64
          path: hisoka-linux-amd64
          if-no-files-found: error

  build-windows:
    name: Build Windows binary
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build hisoka-windows-amd64.exe
        env:
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
        run: go build -v -trimpath -o hisoka-windows-amd64.exe .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: hisoka-windows-amd64.exe
          path: hisoka-windows-amd64.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          set -euo pipefail
          mkdir -p release
          cp artifacts/hisoka-linux-amd64/hisoka-linux-amd64           release/
          cp artifacts/hisoka-windows-amd64.exe/hisoka-windows-amd64.exe release/
          chmod +x release/hisoka-linux-amd64
          ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
