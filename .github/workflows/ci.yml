name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build deps (gcc for CGO/sqlite3)
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        env:
          CGO_ENABLED: "1"
        run: go build -v ./...
