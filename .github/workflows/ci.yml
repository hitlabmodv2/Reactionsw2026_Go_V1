name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build deps (gcc for CGO/sqlite3)
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Download modules
        run: go mod download

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy -diff || {
            echo "::error::go.mod / go.sum are out of sync. Run 'go mod tidy' locally and commit the result."
            exit 1
          }

      - name: go vet
        run: go vet ./...

      - name: go build
        env:
          CGO_ENABLED: "1"
        run: go build -v ./...

  build-windows:
    # Mirrors the Linux build job above so that any change which
    # accidentally breaks the Windows toolchain (CGO/sqlite3, path
    # handling, etc.) is caught early — *before* a release tag is cut.
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: go build
        env:
          CGO_ENABLED: "1"
        run: go build -v ./...
